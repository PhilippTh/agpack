# GitHub Copilot in VS Code

skills:
  kind: copy-directory
  path: .github/skills

commands:
  kind: copy-file
  path: .github/prompts

agents:
  kind: copy-file
  path: .github/agents

mcp:
  kind: edit-file
  path: .vscode/mcp.json
  merge:
    servers_key: servers
    transports:
      stdio:
        type_value: stdio
      http:
        type_value: http
      sse:
        type_value: sse
