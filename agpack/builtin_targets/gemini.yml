# Gemini CLI (Google)

skills:
  kind: copy-directory
  path: .gemini/skills

commands:
  kind: copy-file
  path: .gemini/commands

mcp:
  kind: edit-file
  path: .gemini/settings.json
  merge:
    servers_key: mcpServers
    transports:
      stdio: {}
      http:
        url_key: httpUrl
      sse: {}
