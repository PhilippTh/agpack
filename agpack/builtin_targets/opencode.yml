# OpenCode (opencode.ai)

skills:
  layout: directory
  path: .opencode/skills

commands:
  layout: file
  path: .opencode/commands

agents:
  layout: file
  path: .opencode/agents

mcp:
  path: opencode.json
  format: json
  servers_key: mcp
  defaults:
    $schema: https://opencode.ai/config.json
  transports:
    stdio:
      type_value: local
      command_format: array
      env_key: environment
    http:
      type_value: remote
    sse:
      type_value: remote
