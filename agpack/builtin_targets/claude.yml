# Claude Code (Anthropic CLI)

skills:
  kind: copy-directory
  path: .claude/skills

commands:
  kind: copy-file
  path: .claude/commands

agents:
  kind: copy-file
  path: .claude/agents

mcp:
  kind: edit-file
  path: .mcp.json
  merge:
    servers_key: mcpServers
    transports:
      stdio: {}
      http:
        type_value: http
      sse:
        type_value: sse
