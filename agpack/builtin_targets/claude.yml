# Claude Code (Anthropic CLI)

skills:
  layout: directory
  path: .claude/skills

commands:
  layout: file
  path: .claude/commands

agents:
  layout: file
  path: .claude/agents

mcp:
  path: .mcp.json
  format: json
  servers_key: mcpServers
  transports:
    stdio: {}
    http:
      type_value: http
    sse:
      type_value: sse
